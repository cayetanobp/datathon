<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Mapa analítico e interactivo de las rentas medias por distrito en Málaga para la toma de decisiones gastronómicas.">
  <title>Málaga Gastro-Locator</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="" crossorigin=""/>
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>📍 Málaga Gastro-Locator</h1>
    <p>Analiza el perfil económico de los distritos para posicionar tu negocio de restauración.</p>
  </header>

  <main>
    <div class="controls-card">
      <div class="control-group">
        <label for="perfil">Perfil económico del cliente:</label>
        <select id="perfil" name="perfil">
          <option value="Todas">Todos los perfiles</option>
          <option value="Renta Baja">Renta Baja (&lt; 22K €)</option>
          <option value="Renta Media">Renta Media (22K - 28K €)</option>
          <option value="Renta Alta">Renta Alta (&gt; 28K €)</option>
        </select>
      </div>
      <button id="reset" aria-label="Restablecer todos los filtros del mapa">Mostrar todas las zonas</button>
    </div>

    <div id="map" role="region" aria-label="Mapa interactivo de distritos de Málaga"></div>

    <section class="data-section">
      <h2>Métricas por Zonas de Influencia</h2>
      <div class="table-container">
        <table id="table" aria-live="polite">
          <caption class="sr-only">Desglose de la renta media anual por distritos de Málaga</caption>
          <thead>
            <tr>
              <th scope="col">Distrito</th>
              <th scope="col">Renta Media Anual</th>
              <th scope="col">Clasificación</th>
            </tr>
          </thead>
          <tbody id="table-body">
            </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    async function load(){
      try {
        const res = await fetch('data.json');
        const data = await res.json();
        
        // Render coordinates matching Málaga center
        const map = L.map('map').setView([36.7213, -4.4214], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const markers = [];
        
        // CSS Linked variable colors for map syncing
        function colorFor(cat) {
          if(cat === 'Renta Baja') return '#1d4ed8';
          if(cat === 'Renta Media') return '#b45309';
          return '#b91c1c';
        }

        function badgeClassFor(cat) {
          if(cat === 'Renta Baja') return 'badge-low';
          if(cat === 'Renta Media') return 'badge-medium';
          return 'badge-high';
        }

        function renderTable(items) {
          const tableBody = document.getElementById('table-body');
          tableBody.innerHTML = items.map(r => `
            <tr>
              <td><strong>${r.Distrito}</strong></td>
              <td>${r.Renta_Media_Euros.toLocaleString('es-ES')} €</td>
              <td><span class="badge ${badgeClassFor(r.Categoria)}">${r.Categoria}</span></td>
            </tr>
          `).join('');
        }

        // Draw spatial zones (1.3km radii) representing localized demographic reach
        data.forEach(r => {
          const m = L.circle([r.Lat, r.Lon], {
            radius: 1300, 
            color: colorFor(r.Categoria), 
            weight: 2,
            fill: true, 
            fillColor: colorFor(r.Categoria),
            fillOpacity: 0.35
          })
            .bindPopup(`<b>${r.Distrito}</b><br>Renta: <b>${r.Renta_Media_Euros.toLocaleString('es-ES')} €</b><br>Segmento: ${r.Categoria}`)
            .addTo(map);
            
          markers.push({ marker: m, record: r });
        });

        function filterBy(cat) {
          const items = cat === 'Todas' ? data : data.filter(d => d.Categoria === cat);
          markers.forEach(x => { 
            if(items.indexOf(x.record) === -1) {
              map.removeLayer(x.marker); 
            } else {
              x.marker.addTo(map); 
            }
          });
          renderTable(items);
        }

        // Events binding
        document.getElementById('perfil').addEventListener('change', e => filterBy(e.target.value));
        document.getElementById('reset').addEventListener('click', () => { 
          document.getElementById('perfil').value = 'Todas'; 
          filterBy('Todas'); 
        });

        renderTable(data);
        
      } catch (error) {
        console.error("Data pipeline execution error:", error);
        document.getElementById('table-body').innerHTML = `<tr><td colspan="3" style="color:var(--primary); text-align:center; font-weight:bold; padding:2rem;">Error al mapear los recursos de datos locales.</td></tr>`;
      }
    }
    load();
  </script>
</body>
</html>
